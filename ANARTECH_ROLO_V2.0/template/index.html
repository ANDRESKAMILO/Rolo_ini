<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANARTECH Balta V1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 ANARTECH Balta V1.0 🚀</h1>
        <img src="pug_black.png" alt="Balta the black pug" class="balta-image">
        <p id="status">Balta te mira con emoción, ¿qué quieres hacer?</p>
        <div class="buttons">
            <button onclick="petBalta()">🐾 Acariciar</button>
            <button onclick="feedBalta()">🍖 Dar comida</button>
            <button onclick="playWithBalta()">🎾 Jugar</button>
            <button onclick="giveWater()">💦 Dar agua</button>
            <button onclick="putToSleep()">😴 Dormir</button>
            <button onclick="activateVRMode()">🕶️ Activar Modo VR</button> <!-- Nuevo botón -->
            <button onclick="activateArchitectMode()">🏗️ Modo Arquitecto</button> <!-- Nuevo botón -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
